<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate Reports - XFinance</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            margin-bottom: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #334155;
        }

        select, button {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .preview-section {
            margin-top: 32px;
            padding-top: 32px;
            border-top: 1px solid #e2e8f0;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: white;
            text-decoration: none;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: #f8fafc;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #667eea;
            margin-top: 8px;
        }

        canvas {
            max-height: 300px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <i class="fas fa-file-alt" style="font-size: 48px; color: #667eea;"></i>
                <h1>Generate Financial Reports</h1>
                <p style="color: #64748b;">Create comprehensive reports of your finances</p>
            </div>

            <div class="form-group">
                <label>Select Month</label>
                <select id="reportMonth">
                    <option value="all">All Time</option>
                    <option value="2026-04">April 2024</option>
                    <option value="2026-03">March 2024</option>
                    <option value="2026-02">February 2024</option>
                    <option value="2026-01">January 2024</option>
                </select>
            </div>

            <div class="form-group">
                <label>Report Type</label>
                <select id="reportType">
                    <option value="summary">Summary Report</option>
                    <option value="detailed">Detailed Transactions</option>
                    <option value="category">Category Analysis</option>
                    <option value="insights">AI Insights Report</option>
                </select>
            </div>

            <button onclick="generateReport()">
                <i class="fas fa-download"></i> Generate PDF Report
            </button>

            <div class="preview-section" id="previewSection" style="display: none;">
                <h3 style="margin-bottom: 20px;">Report Preview</h3>
                <div id="previewContent"></div>
            </div>
        </div>
        <a href="/" class="back-link">← Back to Dashboard</a>
    </div>

    <script>
        let chart = null;

        async function generateReport() {
            const month = document.getElementById('reportMonth').value;
            const type = document.getElementById('reportType').value;
            
            try {
                const response = await fetch('/api/generate-report', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ month, type })
                });
                
                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `xfinance_report_${month}.pdf`;
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    alert('Report generated successfully!');
                } else {
                    alert('Error generating report');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Failed to generate report');
            }
        }

        // Load preview data
        async function loadPreview() {
            try {
                const response = await fetch('/api/dashboard-data');
                const data = await response.json();
                if (data.success) {
                    const previewHtml = `
                        <div class="stats-grid">
                            <div class="stat-card">
                                <div>Total Income</div>
                                <div class="stat-value">₹${data.metrics.total_income.toLocaleString()}</div>
                            </div>
                            <div class="stat-card">
                                <div>Total Expenses</div>
                                <div class="stat-value">₹${data.metrics.total_expenses.toLocaleString()}</div>
                            </div>
                            <div class="stat-card">
                                <div>Net Savings</div>
                                <div class="stat-value">₹${data.metrics.net_savings.toLocaleString()}</div>
                            </div>
                        </div>
                        <canvas id="previewChart"></canvas>
                    `;
                    document.getElementById('previewContent').innerHTML = previewHtml;
                    document.getElementById('previewSection').style.display = 'block';
                    
                    // Create preview chart
                    const ctx = document.getElementById('previewChart').getContext('2d');
                    if (chart) chart.destroy();
                    chart = new Chart(ctx, {
                        type: 'doughnut',
                        data: {
                            labels: Object.keys(data.categories),
                            datasets: [{
                                data: Object.values(data.categories),
                                backgroundColor: ['#3b82f6', '#f59e0b', '#10b981', '#8b5cf6', '#94a3b8']
                            }]
                        }
                    });
                }
            } catch (error) {
                console.error('Error loading preview:', error);
            }
        }

        loadPreview();
    </script>
</body>
</html>
